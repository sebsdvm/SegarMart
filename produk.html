<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semua Produk - SegarMart</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <header>
    <div class="container nav-wrapper">
      <a href="index.html" class="logo"><i class="fas fa-leaf"></i> SegarMart</a>
      <nav>
        <ul>
          <li><a href="index.html">Beranda</a></li>
          <li><a href="produk.html">Produk</a></li>
          <li><a href="tentang.html">Tentang</a></li>
          <li><a href="kontak.html">Kontak</a></li>
        </ul>
      </nav>
      <div class="nav-icons">
        <a href="keranjang.html"><i class="fas fa-shopping-cart"></i><span class="cart-badge">0</span></a>
        <a href="#"><i class="fas fa-user"></i></a>
        <button class="menu-toggle"><i class="fas fa-bars"></i></button>
      </div>
    </div>
  </header>

  <section style="background:linear-gradient(135deg,#e8f5e9 0%,#fff3e0 100%);padding:50px 0;">
    <div class="container" style="text-align:center;">
      <h1 style="color:var(--primary-dark);font-size:2.5rem;">Katalog Buah Segar</h1>
      <p style="color:var(--muted);margin-top:10px;">Pilih buah favorit Anda dari koleksi terbaik kami</p>
    </div>
  </section>

  <section>
    <div class="container">
      <div class="filter-bar">
        <button class="filter-btn active" data-cat="all"><i class="fas fa-border-all"></i> Semua</button>
        <button class="filter-btn" data-cat="lokal"><i class="fas fa-flag"></i> Buah Lokal</button>
        <button class="filter-btn" data-cat="impor"><i class="fas fa-globe"></i> Buah Impor</button>
      </div>
      <div id="all-products" class="products-grid"></div>
    </div>
  </section>

  <footer>
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 SegarMart. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
